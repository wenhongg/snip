name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Python setuptools (needed by node-gyp)
        run: brew install python-setuptools

      - run: npm ci

      - name: Rebuild native modules for target arch
        run: npx node-gyp rebuild --arch=arm64

      - name: Download HuggingFace models
        run: node scripts/download-models.js

      - name: Download bundled Node.js binary
        run: node scripts/download-node.js --arch arm64

      - name: Build, sign, notarize & publish
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg zip --arm64 --publish always

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --generate-notes

  update-cask:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: rixinhahaha/homebrew-snip
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask version and checksums
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          DMG_ARM64="https://github.com/rixinhahaha/snip/releases/download/v${VERSION}/Snip-${VERSION}-arm64.dmg"
          # Wait for release asset to be available (GitHub propagation delay)
          for i in 1 2 3 4 5; do curl -o /dev/null -sf "$DMG_ARM64" && break; echo "Waiting for release asset..."; sleep 30; done
          if ! curl -o /dev/null -sf "$DMG_ARM64"; then echo "Release asset not available after retries"; exit 1; fi
          SHA_ARM64=$(curl -sLf "$DMG_ARM64" | shasum -a 256 | cut -d' ' -f1)

          cat > Casks/snip.rb << EOF
          cask "snip" do
            version "${VERSION}"
            sha256 "${SHA_ARM64}"

            url "https://github.com/rixinhahaha/snip/releases/download/v#{version}/Snip-#{version}-arm64.dmg"
            name "Snip"
            desc "Screenshot app with annotation, AI-powered organization, and semantic search"
            homepage "https://github.com/rixinhahaha/snip"

            depends_on macos: ">= :ventura"
            depends_on arch: :arm64

            livecheck do
              url :url
              strategy :github_latest
            end

            app "Snip.app"

            zap trash: [
              "~/Library/Application Support/snip",
              "~/Library/Caches/snip",
              "~/Library/Preferences/com.snip.app.plist",
              "~/Library/Saved Application State/com.snip.app.savedState",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/snip.rb
          git commit -m "Update snip to ${GITHUB_REF#refs/tags/v}"
          git push
