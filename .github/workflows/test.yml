name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips postinstall (electron-builder install-app-deps)
        # and prebuild (node-gyp rebuild), neither of which are needed for unit tests.
        # --force bypasses platform checks (electron-liquid-glass requires darwin).
        # Electron binary is NOT needed — all Electron APIs are mocked via vi.mock('electron')
        # in tests/setup/electron-mock.js. ELECTRON_SKIP_BINARY_DOWNLOAD suppresses the
        # "Electron failed to install correctly" error that occurs when the package's
        # post-install binary check runs without the binary present.
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci --ignore-scripts --force

      - name: Run tests
        run: npx vitest run --reporter=verbose
