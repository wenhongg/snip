appId: com.snip.app
productName: Snip
copyright: Copyright 2024
directories:
  output: dist
  buildResources: assets

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize: true
  extendInfo:
    LSUIElement: true
    NSScreenCaptureUsageDescription: "Snip needs screen recording permission to capture screenshots."
  asarUnpack:
    - "node_modules/electron-liquid-glass/**"
  extraResources:
    - from: "build/Release/window_utils.node"
      to: "native/window_utils.node"

artifactName: "Snip-${version}-${arch}.${ext}"

dmg:
  title: "Snip"
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

afterPack: scripts/afterPack.js

files:
  - src/**/*
  - assets/**/*
  - "!**/*.map"
  - "!**/node_modules/canvas{,/**}"

asarUnpack:
  - "src/main/segmentation/segmentation-worker.js"
  - "src/main/upscaler/upscaler-worker.js"
  - "src/main/organizer/embeddings-worker.js"
  - "src/main/addon-model-downloader.js"
  - "src/main/addon-resolve.js"
  - "src/main/transcription/transcribe.swift"
  - "src/main/animation/gif-encoder-worker.js"
  - "src/mcp/server.js"
  - "src/main/extension-sandbox-worker.js"
  - "node_modules/sharp/**"
  - "node_modules/@img/**"
  - "node_modules/detect-libc/**"
  - "node_modules/gifenc/**"
  - "node_modules/upng-js/**"
  - "node_modules/pako/**"

extraResources:
  - from: "src/cli/snip.js"
    to: "cli/snip.js"

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Utility
  icon: assets/icon.png

publish:
  provider: github
  owner: rixinhahaha
  repo: snip

extraMetadata:
  main: src/main/main.js
