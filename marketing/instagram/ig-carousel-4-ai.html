<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; display: flex; align-items: center; justify-content: center; background: #13101e; }
  body {
    width: 1080px; height: 1350px; overflow: hidden; margin: 0 auto;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #13101e;
    color: white;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 120px 60px 60px;
  }
  .badge {
    padding: 8px 20px; border-radius: 100px;
    background: rgba(167,139,250,0.12);
    font-size: 16px; color: #c4b5fd; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 72px; font-weight: 800; line-height: 1.1;
    letter-spacing: -3px; margin-bottom: 14px; text-align: center;
  }
  h1 span { color: #a78bfa; }
  .subtitle {
    font-size: 26px; color: rgba(255,255,255,0.45); text-align: center;
    margin-bottom: 56px;
  }
  .transform {
    display: flex; align-items: center; gap: 32px;
    margin-bottom: 0;
  }
  .card {
    width: 340px; padding: 28px; border-radius: 20px;
    background: rgba(255,255,255,0.03);
  }
  .card-label {
    font-size: 13px; color: rgba(255,255,255,0.3); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 16px;
  }
  .card-label.after { color: rgba(139,92,246,0.6); }
  .card-thumb {
    width: 100%; height: 160px; border-radius: 12px; overflow: hidden;
    margin-bottom: 16px;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-filename {
    font-family: 'SF Mono', monospace; font-size: 14px;
    color: rgba(255,255,255,0.35); padding: 10px 12px;
    background: rgba(255,255,255,0.03); border-radius: 10px;
    word-break: break-all; line-height: 1.4;
  }
  .card-name {
    font-size: 18px; font-weight: 600; margin-bottom: 8px;
  }
  .card-tags {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .tag {
    padding: 4px 12px; border-radius: 100px;
    background: rgba(34,197,94,0.1);
    font-size: 13px; color: #86efac;
  }
  .arrow {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .arrow-sparkle { font-size: 32px; }
  .arrow-line {
    width: 48px; height: 3px;
    background: linear-gradient(90deg, rgba(139,92,246,0.3), #8b5cf6);
    position: relative;
  }
  .arrow-line::after {
    content: ''; position: absolute; right: -1px; top: -5px;
    border: 7px solid transparent; border-left: 9px solid #8b5cf6;
  }
</style>
</head>
<body>
  <div class="badge">AI Organization</div>
  <h1>Save it.<br><span>AI does the rest.</span></h1>
  <p class="subtitle">Auto-names, tags, and categorizes every screenshot</p>
  <div class="transform">
    <div class="card">
      <div class="card-label">Before</div>
      <div class="card-thumb">
        <img src="../../site/assets/hero-poster.jpg" alt="Raw screenshot">
      </div>
      <div class="card-filename">Screenshot 2025-03-14 at 3.42.17 PM.png</div>
    </div>
    <div class="arrow">
      <div class="arrow-sparkle">&#10024;</div>
      <div class="arrow-line"></div>
    </div>
    <div class="card">
      <div class="card-label after">After</div>
      <div class="card-thumb">
        <img src="../../site/assets/hero-poster.jpg" alt="Organized screenshot">
      </div>
      <div class="card-name">google-image-search-dogs</div>
      <div class="card-tags">
        <span class="tag">google</span>
        <span class="tag">dogs</span>
        <span class="tag">search</span>
      </div>
    </div>
  </div>
</body>
</html>
