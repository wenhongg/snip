<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; display: flex; align-items: center; justify-content: center; background: #13101e; }
  body {
    width: 1080px; height: 1350px; overflow: hidden; margin: 0 auto;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #13101e;
    color: white;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 120px 60px 60px;
  }
  .badge {
    padding: 8px 20px; border-radius: 100px;
    background: rgba(251,191,36,0.12);
    font-size: 16px; color: #fbbf24; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 72px; font-weight: 800; line-height: 1.1;
    letter-spacing: -3px; margin-bottom: 14px; text-align: center;
  }
  h1 span { color: #a78bfa; }
  .subtitle {
    font-size: 26px; color: rgba(255,255,255,0.45); text-align: center;
    margin-bottom: 56px;
  }
  .screenshot {
    width: 100%; max-width: 700px; flex: 1; min-height: 0;
    overflow: hidden; border-radius: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  .screenshot img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
  }
</style>
</head>
<body>
  <div class="badge">Search</div>
  <h1>Describe it.<br><span>Find it.</span></h1>
  <p class="subtitle">Semantic search across all your screenshots</p>
  <div class="screenshot">
    <img src="../../site/assets/search-view.jpg" alt="Snip semantic search">
  </div>
</body>
</html>
