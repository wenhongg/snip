<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; display: flex; align-items: center; justify-content: center; background: #13101e; }
  body {
    width: 1080px; height: 1080px; overflow: hidden; margin: 0 auto;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #13101e;
    color: white;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 56px 48px;
  }
  .icon {
    width: 72px; height: 72px; border-radius: 16px; margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(139,92,246,0.3);
  }
  .icon img { width: 100%; height: 100%; object-fit: cover; }
  h1 {
    font-size: 56px; font-weight: 800; line-height: 1.1;
    letter-spacing: -2px; margin-bottom: 10px; text-align: center;
  }
  h1 span { color: #a78bfa; }
  .subtitle {
    font-size: 22px; color: rgba(255,255,255,0.45); text-align: center;
    margin-bottom: 36px;
  }
  .screenshot {
    width: 100%; max-width: 620px; flex: 1; min-height: 0;
    overflow: hidden; border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  .screenshot img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
  }
</style>
</head>
<body>
  <div class="icon">
    <img src="../../site/assets/icon.png" alt="Snip">
  </div>
  <h1>Capture. Annotate.<br><span>Find anything.</span></h1>
  <p class="subtitle">AI-powered screenshots for macOS</p>
  <div class="screenshot">
    <img src="../../site/assets/hero-editor.jpg" alt="Snip editor">
  </div>
</body>
</html>
