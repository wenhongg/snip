<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; display: flex; align-items: center; justify-content: center; background: #13101e; }
  body {
    width: 1080px; height: 1080px; overflow: hidden; margin: 0 auto;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #13101e;
    color: white;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 56px 48px;
  }
  .badge {
    padding: 6px 16px; border-radius: 100px;
    background: rgba(139,92,246,0.12);
    font-size: 14px; color: #c4b5fd; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 56px; font-weight: 800; line-height: 1.1;
    letter-spacing: -2px; margin-bottom: 10px; text-align: center;
  }
  .subtitle {
    font-size: 22px; color: rgba(255,255,255,0.45); text-align: center;
    margin-bottom: 32px;
  }
  .keys {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .kbd {
    display: inline-block; padding: 8px 16px; border-radius: 10px;
    background: rgba(255,255,255,0.08);
    font-family: 'SF Mono', monospace; font-size: 28px; font-weight: 600;
    color: rgba(255,255,255,0.7);
  }
  .kbd-plus {
    font-size: 22px; color: rgba(255,255,255,0.25);
  }
  .screenshot {
    width: 100%; max-width: 620px; flex: 1; min-height: 0;
    overflow: hidden; border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  .screenshot img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
  }
</style>
</head>
<body>
  <div class="badge">Capture</div>
  <div class="keys">
    <span class="kbd">&#8984;</span>
    <span class="kbd-plus">+</span>
    <span class="kbd">&#8679;</span>
    <span class="kbd-plus">+</span>
    <span class="kbd">2</span>
  </div>
  <h1>Select. Done.</h1>
  <p class="subtitle">Grab any region on any display instantly</p>
  <div class="screenshot">
    <img src="../../site/assets/hero-capture.jpg" alt="Snip capture overlay">
  </div>
</body>
</html>
