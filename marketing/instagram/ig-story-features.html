<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; display: flex; align-items: center; justify-content: center; background: #13101e; }
  body {
    width: 1080px; height: 1920px; overflow: hidden; margin: 0 auto;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #13101e;
    color: white;
    display: flex; flex-direction: column; align-items: center;
    padding: 160px 60px 80px;
    position: relative;
  }

  .icon {
    width: 112px; height: 112px; border-radius: 26px; margin-bottom: 32px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(139,92,246,0.3);
  }
  .icon img { width: 100%; height: 100%; object-fit: cover; }

  h1 {
    font-size: 80px; font-weight: 800; line-height: 1.1;
    letter-spacing: -3px; margin-bottom: 16px; text-align: center;
  }
  h1 span { color: #a78bfa; }

  .subtitle {
    font-size: 30px; color: rgba(255,255,255,0.45); text-align: center;
    margin-bottom: 64px;
  }

  .screenshot {
    width: 100%; max-width: 700px; flex: 1; min-height: 0;
    overflow: hidden; border-radius: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  .screenshot img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
  }

  .bottom {
    margin-top: 56px; text-align: center;
  }
  .domain {
    font-size: 28px; font-weight: 700; color: #a78bfa;
    margin-bottom: 10px;
  }
  .pills {
    display: flex; gap: 12px; justify-content: center;
  }
  .pill {
    padding: 10px 20px; border-radius: 100px;
    background: rgba(139,92,246,0.12);
    font-size: 16px; color: #c4b5fd; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="icon">
    <img src="../../site/assets/icon.png" alt="Snip">
  </div>
  <h1>Capture. Annotate.<br><span>Find anything.</span></h1>
  <p class="subtitle">AI-powered screenshots for macOS</p>

  <div class="screenshot">
    <img src="../../site/assets/hero-editor.jpg" alt="Snip editor">
  </div>

</body>
</html>
