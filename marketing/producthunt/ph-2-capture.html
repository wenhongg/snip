<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; display: flex; align-items: center; justify-content: center; background: #13101e; }
  body {
    width: 1270px; height: 760px; overflow: hidden; margin: 0 auto;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #13101e;
    color: white;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
  }

  .glow { display: none; }

  .header {
    text-align: center; margin-bottom: 44px; z-index: 1;
  }
  .badge-label {
    display: inline-block; padding: 6px 16px; border-radius: 100px;
    background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3);
    font-size: 13px; color: #c4b5fd; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 16px;
  }
  h1 {
    font-size: 44px; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px;
  }
  h1 span { color: #a78bfa; }
  .subtitle {
    font-size: 20px; color: rgba(255,255,255,0.5); max-width: 600px;
  }

  .steps {
    display: flex; gap: 32px; z-index: 1;
  }

  .step {
    width: 300px; text-align: center; position: relative;
  }

  .step-visual {
    width: 300px; height: 200px; border-radius: 0; margin-bottom: 18px;
    overflow: hidden; position: relative;
    border: none;
    box-shadow: none;
  }
  .step-visual img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Clipboard done visual */
  .done-visual {
    width: 300px; height: 200px; border-radius: 0; margin-bottom: 18px;
    background: rgba(20,15,35,0.8); border: none;
    box-shadow: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  }
  .clipboard-icon {
    width: 64px; height: 64px; border-radius: 16px;
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
    border: 1px solid rgba(34,197,94,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .done-text { font-size: 16px; color: rgba(255,255,255,0.6); }
  .done-text em { color: #22c55e; font-weight: 600; font-style: normal; }

  .step-number {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; margin: 0 auto 10px;
  }
  .step-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .step-desc { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.4; }

  .kbd {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    font-family: monospace; font-size: 12px; color: rgba(255,255,255,0.6);
  }

  /* Connector arrows between steps */
  .step:not(:last-child)::after {
    content: ''; position: absolute;
    right: -20px; top: 100px;
    width: 12px; height: 2px;
    background: rgba(139,92,246,0.3);
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="header">
    <div class="badge-label">Workflow</div>
    <h1>Capture to Clipboard in <span>5 Seconds</span></h1>
    <p class="subtitle">Two keystrokes to capture. Annotate if you want. Done.</p>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-visual">
        <img src="../../site/assets/hero-capture.jpg" alt="Capture overlay">
      </div>
      <div class="step-number">1</div>
      <div class="step-title">Capture</div>
      <div class="step-desc"><span class="kbd">&#8984;&#8679;2</span> — drag to select any region on any display</div>
    </div>

    <div class="step">
      <div class="step-visual">
        <img src="../../site/assets/hero-editor.jpg" alt="Annotation editor">
      </div>
      <div class="step-number">2</div>
      <div class="step-title">Annotate</div>
      <div class="step-desc">Rectangles, arrows, text, blur, and AI segmentation</div>
    </div>

    <div class="step">
      <div class="done-visual">
        <div class="clipboard-icon">&#9989;</div>
        <div class="done-text"><em>Copied</em> to clipboard</div>
      </div>
      <div class="step-number">3</div>
      <div class="step-title">Done</div>
      <div class="step-desc">Press <span class="kbd">Esc</span> — annotated image is on your clipboard</div>
    </div>
  </div>
</body>
</html>
